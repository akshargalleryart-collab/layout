<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout System Generator</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <!-- 🔥 ADD: html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'serif'],
            body: ['DM Sans', 'sans-serif'],
            mono: ['Space Mono', 'monospace']
          }
        }
      }
    }
  </script>

  <!-- ⚠️ STYLE ASLI KAMU (tidak diubah, dipersingkat di sini biar readable) -->
  <style>
    html, body { height: 100%; margin: 0; }
    .poster-canvas { width:1080px;height:1350px;position:relative;overflow:hidden;}
    .poster-wrapper { transform-origin: top center; }
  </style>
</head>

<body class="h-full bg-neutral-50 text-neutral-900 font-body overflow-auto">

<div id="app" class="w-full min-h-full">

<!-- HEADER -->
<div class="px-6 py-5 border-b border-neutral-200 flex items-center justify-between">
  <div>
    <p class="text-neutral-400 text-[10px] font-mono tracking-wider uppercase mb-2">
      By Akshardesain.id
    </p>
    <h1 class="font-display text-xl font-bold tracking-tight">Layout System</h1>
  </div>

  <!-- 🔥 UPDATED HEADER -->
  <div class="flex items-center gap-3">

    <button id="downloadBtn"
      class="px-3 py-2 rounded-lg text-[11px] font-semibold border border-neutral-300 bg-white hover:border-neutral-400">
      Download PNG
    </button>

    <select id="layoutSelect"
      class="px-3 py-2 rounded-lg text-[11px] font-semibold border border-neutral-300 bg-white">
      <option value="1">Layout 1</option>
      <option value="2">Layout 2</option>
      <option value="3">Layout 3</option>
      <option value="4">Layout 4</option>
      <option value="5">Layout 5</option>
      <option value="6">Layout 6</option>
      <option value="7">Layout 7</option>
      <option value="8">Layout 8</option>
      <option value="9">Layout 9</option>
    </select>

  </div>
</div>

<!-- PREVIEW -->
<div class="py-10 flex justify-center">
  <div class="poster-wrapper" id="posterWrapper">
    <div class="poster-canvas" id="posterCanvas" style="background:#fff;">

      <div id="p_headline">BEYOND THE EDGE</div>

    </div>
  </div>
</div>

</div>

<!-- 🔥 DOWNLOAD SCRIPT -->
<script>
(function () {

  const btn = document.getElementById('downloadBtn');

  btn.addEventListener('click', async () => {

    const original = document.getElementById('posterCanvas');

    const clone = original.cloneNode(true);

    clone.style.width = '1080px';
    clone.style.height = '1350px';
    clone.style.transform = 'none';
    clone.style.position = 'fixed';
    clone.style.top = '-9999px';

    document.body.appendChild(clone);

    const canvas = await html2canvas(clone, {
      width: 1080,
      height: 1350,
      scale: 2,
      useCORS: true
    });

    const link = document.createElement('a');
    link.download = 'poster.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    document.body.removeChild(clone);
  });

})();
</script>

</body>
</html>
