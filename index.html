<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster Generator</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { margin:0; background:#f5f5f5; font-family:sans-serif; }

/* CANVAS */
.poster-canvas{
  width:1080px;
  height:1350px;
  position:relative;
  background:#fff;
  overflow:hidden;
}

/* WRAPPER SCALE */
.poster-wrapper{
  transform-origin: top center;
}

/* HERO */
.hero-image-area{
  position:absolute;
  top:490px;
  left:40px;
  right:40px;
  height:520px;
  overflow:hidden;
  border-radius:16px;
}

.hero-image-area img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🔥 FIX OVERLAY (NO ::after) */
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0) 70%,
    rgba(255,255,255,1) 100%
  );
}

/* TEXT */
.headline{
  position:absolute;
  top:60px;
  left:40px;
  right:40px;
  font-size:120px;
  font-weight:bold;
  text-align:center;
}

.sub{
  position:absolute;
  top:350px;
  left:40px;
  right:40px;
  text-align:center;
  font-size:26px;
}

</style>
</head>

<body>

<div class="p-4 flex gap-3">
  <input id="inp_title" placeholder="Judul" class="border p-2">
  <button id="downloadBtn" class="border px-3">Download</button>
</div>

<div class="flex justify-center py-10">
  <div class="poster-wrapper" id="wrapper">
    <div class="poster-canvas" id="canvas">

      <div class="headline" id="p_title">BEYOND THE EDGE</div>

      <div class="sub" id="p_sub">Creative exploration</div>

      <div class="hero-image-area" id="hero">
        <img id="imgHero">
        <div class="hero-overlay"></div>
      </div>

    </div>
  </div>
</div>

<input type="file" id="file" hidden>

<script>
let lastImg = null;

/* INPUT */
document.getElementById('inp_title').addEventListener('input', e=>{
  document.getElementById('p_title').textContent = e.target.value;
});

/* UPLOAD */
document.getElementById('hero').onclick = ()=> file.click();

file.onchange = e=>{
  const f = e.target.files[0];
  const r = new FileReader();

  r.onload = ev=>{
    lastImg = ev.target.result;
    document.getElementById('imgHero').src = lastImg;
  };

  r.readAsDataURL(f);
};

/* SCALE */
function scale(){
  const wrap = document.getElementById('wrapper');
  const w = Math.min(window.innerWidth - 40, 900);
  const s = Math.min(w/1080, 0.55);

  wrap.style.transform = `scale(${s})`;
  wrap.style.height = `${1350*s}px`;
}
window.onresize = scale;
scale();

/* DOWNLOAD FINAL */
document.getElementById('downloadBtn').onclick = async ()=>{

  const canvasEl = document.getElementById('canvas');
  const wrapper = document.getElementById('wrapper');

  const prev = wrapper.style.transform;
  wrapper.style.transform = 'scale(1)';

  const imgs = canvasEl.querySelectorAll('img');
  await Promise.all([...imgs].map(img=>{
    if(img.complete) return;
    return new Promise(res=>{
      img.onload = img.onerror = res;
    });
  }));

  const canvas = await html2canvas(canvasEl,{
    width:1080,
    height:1350,
    scale:2,
    backgroundColor:'#fff',
    scrollX:0,
    scrollY:0,
    windowWidth:1080,
    windowHeight:1350
  });

  wrapper.style.transform = prev;

  const link = document.createElement('a');
  link.download = 'poster.png';
  link.href = canvas.toDataURL();
  link.click();
};
</script>

</body>
</html>
